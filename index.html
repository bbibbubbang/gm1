<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Web Game Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue */
            font-family: sans-serif;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            pointer-events: auto;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
            display: none;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid black;
            border-radius: 50%;
            display: none;
        }

        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            display: none; /* Shown via JS */
            pointer-events: auto;
            touch-action: none;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        #touch-look-zone {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            pointer-events: auto;
            touch-action: none;
            display: none; /* Shown via JS */
        }

        #hotbar-container {
            position: absolute;
            bottom: 80px;
            right: 20px; /* Fixed right instead of center */
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 5px;
            pointer-events: auto;
            touch-action: none;
        }

        .hotbar-slot {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #555;
            border-radius: 5px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px black;
            cursor: pointer;
        }

        .hotbar-slot.active {
            border-color: #fff;
            box-shadow: 0 0 10px white;
        }

        .hotbar-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.8rem;
            color: #ddd;
        }

        .cooldown-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 3px;
            transition: height 0.1s linear;
        }

        #options-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 2px solid #555;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
        }

        #options-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            pointer-events: auto;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #options-menu h3 {
            margin-top: 0;
        }

        #map-select {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid #555;
            padding: 5px;
            border-radius: 5px;
            margin-left: 10px;
        }

        .option-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .option-row label {
            margin-left: 10px;
        }

        #close-options-btn {
            padding: 5px 15px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #jump-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #555;
            border-radius: 5px;
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            pointer-events: auto;
            touch-action: none;
            cursor: pointer;
            user-select: none;
        }
        #jump-btn:active {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="loading-screen">
            <div class="spinner"></div>
            <h2>Loading Map...</h2>
            <p id="loading-text">Please wait</p>
        </div>

        <div id="instructions">
            <h2>3D Web Game</h2>
            <p>Click or Tap to play</p>
            <p>W, A, S, D = Move<br>SPACE = Jump<br>Mouse = Look<br>1-9 = Use Skills<br>Mobile: On-screen controls</p>
        </div>

        <div id="crosshair"></div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div id="touch-look-zone"></div>

        <div id="hotbar-container">
            <!-- Slots will be generated by JS -->
        </div>

        <div id="jump-btn">JUMP</div>

        <button id="options-btn">Options</button>
        <div id="options-menu">
            <h3>Options</h3>
            <div class="option-row">
                <label for="map-select">Map:</label>
                <select id="map-select">
                    <option value="forest">Forest</option>
                    <option value="village">Village</option>
                </select>
            </div>
            <div class="option-row">
                <input type="checkbox" id="tracking-camera-cb">
                <label for="tracking-camera-cb">Tracking Camera</label>
            </div>
            <div class="option-row">
                <button id="fullscreen-btn">Fullscreen (Landscape)</button>
            </div>
            <button id="close-options-btn">Close</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
